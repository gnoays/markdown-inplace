name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      vsix: ${{ steps.vsix.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx @vscode/vsce package
      - id: vsix
        shell: bash
        run: echo "path=$(ls *.vsix | head -n 1)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
      - uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: ${{ steps.vsix.outputs.path }}
          if-no-files-found: error

  publish-vsce:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-vsix
      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-ovsx:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-vsix
      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
